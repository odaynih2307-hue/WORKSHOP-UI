<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Country Explorer</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #5f9cff, #8f6ed5);
    min-height: 100vh;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* HEADER */
header {
    text-align: center;
    margin-top: 50px;
}

header h1 {
    font-size: 2.7rem;
    margin-bottom: 10px;
}

header p {
    opacity: 0.9;
}

/* SEARCH */
.search-box {
    margin-top: 30px;
    display: flex;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.15);
    padding: 12px;
    border-radius: 50px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

input {
    border: none;
    outline: none;
    padding: 12px 15px;
    border-radius: 50px;
    width: 260px;
    font-size: 15px;
}

button {
    margin-left: 10px;
    border: none;
    background: linear-gradient(135deg, #00c9ff, #92fe9d);
    color: black;
    padding: 12px 20px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* CARD */
.card {
    margin-top: 40px;
    width: 350px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.25);
    animation: fadeIn 0.6s ease;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 15px;
}

.card h2 {
    margin-bottom: 10px;
}

.info {
    text-align: left;
    margin-top: 10px;
    line-height: 1.8;
    font-size: 14px;
}

/* LOADING */
.loading {
    margin-top: 30px;
    font-size: 18px;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* FOOTER */
footer {
    margin-top: auto;
    padding: 20px;
    font-size: 14px;
    opacity: 0.8;
}
</style>
</head>

<body>

<header>
    <h1>🌍 Country Explorer</h1>
    <p>Temukan informasi lengkap negara di dunia</p>
</header>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Cari negara...">
    <button onclick="cariNegara()">Search</button>
</div>

<div id="hasil"></div>

<footer>
    Dibuat dengan HTML, CSS, JavaScript & Rest Countries API
</footer>

<script>
const input = document.getElementById("searchInput");

input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        cariNegara();
    }
});

function cariNegara() {
    const keyword = input.value.trim();
    const hasil = document.getElementById("hasil");

    if (keyword === "") {
        hasil.innerHTML = "<p class='loading'>Masukkan nama negara dulu!</p>";
        return;
    }

    hasil.innerHTML = "<p class='loading'>⏳ Loading data...</p>";

    fetch(`https://restcountries.com/v3.1/name/${keyword}`)
        .then(res => res.json())
        .then(data => {
            const n = data[0];

            hasil.innerHTML = `
                <div class="card">
                    <img src="${n.flags.png}">
                    <h2>${n.name.common}</h2>
                    <div class="info">
                        <p>🏙 <b>Ibu Kota:</b> ${n.capital}</p>
                        <p>🌎 <b>Region:</b> ${n.region}</p>
                        <p>👥 <b>Populasi:</b> ${n.population.toLocaleString()}</p>
                        <p>🗣 <b>Bahasa:</b> ${Object.values(n.languages || {}).join(", ")}</p>
                        <p>💰 <b>Mata Uang:</b> ${Object.values(n.currencies || {})[0]?.name}</p>
                    </div>
                </div>
            `;
        })
        .catch(() => {
            hasil.innerHTML = "<p class='loading'>❌ Negara tidak ditemukan!</p>";
        });
}
</script>

</body>
</html>

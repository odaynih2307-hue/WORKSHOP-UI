<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Tugas Modul HTML CSS JS">
    <meta name="author" content="Ody Dzakwan Berwin">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Form Ody</title>

    <!-- Hubungkan CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Website Form Sederhana</h1>
        <p>Dibuat oleh Ody Dzakwan Berwin</p>
    </header>

    <div class="container">
        <h2>Formulir Data Pengunjung</h2>

        <form id="formData">
            <label>Nama:</label>
            <input type="text" id="nama" required>

            <label>Email:</label>
            <input type="email" id="email" required>

            <label>Pesan:</label>
            <textarea id="pesan" rows="4" required></textarea>

            <button type="submit">Kirim</button>
        </form>

        <div class="hasil" id="output" style="display:none;"></div>
    </div>

    <!-- Hubungkan JavaScript -->
    <script src="script.js"></script>

</body>
</html>
